server {
    listen 8181;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # BUG: syntax error - missing semicolon on proxy_pass
    # nginx will refuse to start with this config
    location / {
        proxy_pass http://127.0.0.1:5000
        proxy_set_header Host $host;
    }
}
