# Featherweight Fleet Simulator (20-1000 nodes)
# Uses minimal Alpine Linux containers to run just the Operator binary.
# 
# To scale:
# docker compose up -d --scale node=1000

networks:
  fleet-net:
    driver: bridge
    ipam:
      config:
        # A /16 subnet allows up to 65,534 container IPs
        # default docker /24 subnets limit you to 254
        - subnet: 10.220.0.0/16
  g8e-network:
    external: true

services:
  node:
    build:
      context: ./containers/node
      dockerfile: Dockerfile
    networks:
      - fleet-net
      - g8e-network
    environment:
      - DEVICE_TOKEN=${DEVICE_TOKEN:-}
      - G8E_ENDPOINT=${G8E_ENDPOINT:-g8e.local}
    # Mount the local cert bundle if it exists
    volumes:
      - g8es-ssl:/g8es:ro
    labels:
      - "demo.service=operator-node"

  dashboard:
    build:
      context: ./containers/dashboard
      dockerfile: Dockerfile
    networks:
      - fleet-net
      - g8e-network
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "demo.service=fleet-dashboard"

volumes:
  g8es-ssl:
    external: true
