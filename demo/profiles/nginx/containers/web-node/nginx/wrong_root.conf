server {
    listen 8181;
    server_name _;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # BUG: root points to nonexistent directory /var/www/webapp
    # The correct path is /var/www/html
    # This causes 404 on every request
    root /var/www/webapp;

    location / {
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /nginx-status {
        stub_status on;
        allow 127.0.0.1;
        deny all;
    }
}
