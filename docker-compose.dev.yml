# g8e Docker Compose Development Override
#
# This file adds source bind mounts for hot reload during development.
# Source code changes are immediately reflected without rebuilding images.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   OR via the development profile:
#   docker compose --profile development up

services:
  g8ee:
    profiles:
      - development
    volumes:
      # Bind mount app source for hot reload
      - ./components/g8ee/app:/app/components/g8ee/app:ro
      - ./components/g8ee/config:/app/components/g8ee/config:ro
