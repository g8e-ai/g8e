# g8e Docker Compose
#
# Usage (via ./g8e CLI):
#   ./g8e platform setup                   # Full first-time setup: no-cache build, start platform (recommended)
#   ./g8e platform start                   # Start core services (no build)
#   ./g8e platform stop                    # Stop containers (preserve everything)
#   ./g8e platform rebuild                 # Rebuild all services with layer cache (data volumes preserved)
#   ./g8e platform rebuild g8ed            # Rebuild a single service (data volumes preserved)
#   ./g8e platform wipe                    # Clear app data; preserve SSL certs, platform settings, auth token
#   ./g8e platform reset                   # Wipe DB data volumes + rebuild from scratch (SSL certs preserved)
#   ./g8e platform clean                   # Full Docker cleanup: containers, images, volumes, networks
#   ./g8e test g8ee                         # Run tests (never rebuilds)
#
# Volume layout:
#   g8es-data  — SQLite DB only (/data inside g8es, wiped by reset)
#   g8es-ssl   — TLS certs only (/ssl inside g8es, NEVER wiped by reset or wipe)
#   g8ee-data — g8ee app data
#   g8ed-data — g8ed app data
#
# Profiles:
#   (default)      - g8es, g8ee, g8ed, g8ep
#   g8ep       - g8ep (never touched unless explicitly rebuilt or cleaned)
#   development    - includes source bind mounts for hot reload
#
# Development:
#   docker compose --profile development up
#   OR use the traditional override:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  # =============================================================================
  # Core Components
  # =============================================================================

  # g8ee (g8ee) - AI backend
  g8ee:
    build:
      context: .
      dockerfile: ./components/g8ee/Dockerfile
      labels:
        - "io.g8e.managed=true"
    container_name: g8ee
    user: "1001:1001"
    labels:
      - "io.g8e.managed=true"
    restart: unless-stopped
    environment:
      - G8E_CA_CERT_PATH=/g8es/ca.crt
      - NODE_EXTRA_CA_CERTS=/g8es/ca.crt
      - G8E_DB_PATH=/data/g8e.db
      - G8E_DOCS_DIR=/docs
    volumes:
      - ./shared:/app/shared:ro
      - ./components/g8ee/app:/app/components/g8ee/app:ro
      - ./components/g8ee/config:/app/components/g8ee/config:ro
      - g8ee-data:/data:noexec,nosuid,nodev
      - g8es-ssl:/g8es:ro
      # SSH inventory source for the AI ssh_inventory tool. Read-only.
      - ${HOME}/.ssh/config:/etc/g8e/ssh_config:ro
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
          pids: 50
        reservations:
          cpus: '0.25'
          memory: 512M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    sysctls:
      - net.ipv4.conf.all.accept_redirects=0
      - net.ipv4.conf.all.send_redirects=0
    networks:
      g8e-network:
        aliases:
          - g8ee
    healthcheck:
      test: ["CMD", "curl", "-f", "--cacert", "/g8es/ca.crt", "https://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      g8es:
        condition: service_healthy

  # g8el (g8el) - llama.cpp inference server
  g8el:
    build:
      context: .
      dockerfile: ./components/g8el/Dockerfile
      labels:
        - "io.g8e.managed=true"
    container_name: g8el
    labels:
      - "io.g8e.managed=true"
    restart: unless-stopped
    ports:
      - "11444:11444"
    volumes:
      - ./components/g8ee/models:/models
    environment:
      - G8EL_MODEL_NAME=google_gemma-4-E2B-it-Q4_K_M.gguf
      - G8EL_MODEL_URL=https://huggingface.co/bartowski/google_gemma-4-E2B-it-GGUF/resolve/main/google_gemma-4-E2B-it-Q4_K_M.gguf
      - G8EL_CONTEXT_SIZE=49152
      - G8EL_THREADS=8
      - G8EL_HOST=0.0.0.0
      - G8EL_PORT=11444
      - OMP_NUM_THREADS=8
    cpuset: "0-3"
    ulimits:
      memlock: -1
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      g8e-network:
        aliases:
          - g8el
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11444/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  # g8ed (g8ed) - Web frontend + single external entry point
  #
  # g8ed's G8ENodeOperatorService manages operator sessions inside the g8ep
  # container via Supervisor XML-RPC over the network (port 443).
  g8ed:
    build:
      context: .
      dockerfile: ./components/g8ed/Dockerfile
      labels:
        - "io.g8e.managed=true"
    container_name: g8ed
    user: "1001:1001"
    labels:
      - "io.g8e.managed=true"
    environment:
      - NODE_EXTRA_CA_CERTS=/g8es/ca.crt
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - g8ed-data:/data:noexec,nosuid,nodev
      - g8es-ssl:/g8es:ro
      - ./shared:/shared:ro
      - ./docs:/docs:ro
      - ./README.md:/readme/README.md:ro
      - ./components/g8ed:/app:ro
      - g8ed-node-modules:/app/node_modules
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
          pids: 50
        reservations:
          cpus: '0.25'
          memory: 512M
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    sysctls:
      - net.ipv4.conf.all.accept_redirects=0
      - net.ipv4.conf.all.send_redirects=0
    networks:
      g8e-network:
        aliases:
          - localhost
          - g8e.local
          - g8ed
    healthcheck:
      test: ["CMD", "curl", "-f", "--cacert", "/g8es/ca.crt", "https://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      g8es:
        condition: service_healthy

  # =============================================================================
  # Data Services
  # =============================================================================

  # g8es (g8es) - Operator in --listen mode: platform persistence + pub/sub broker
  g8es:
    build:
      context: .
      dockerfile: ./components/g8es/Dockerfile
      args:
        VERSION: ${G8E_VERSION:-dev}
      labels:
        - "io.g8e.managed=true"
    container_name: g8es
    user: "1001:1001"
    labels:
      - "io.g8e.managed=true"
    restart: unless-stopped
    environment:
      - G8E_CA_CERT_PATH=/g8es/ca.crt
      - NODE_EXTRA_CA_CERTS=/g8es/ca.crt
    volumes:
      - g8es-data:/data:noexec,nosuid,nodev
      - g8es-ssl:/ssl:noexec,nosuid,nodev
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
          pids: 50
        reservations:
          cpus: '0.1'
          memory: 128M
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    networks:
      g8e-network:
        aliases:
          - g8es
  # Internal services only - uses ports 9000 (HTTPS) and 9001 (WSS)
    healthcheck:
      test: ["CMD-SHELL", "curl -f --cacert /ssl/ca.crt https://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
      

  # =============================================================================
  # Test Runners — per-component, lean, parallel-buildable
  # =============================================================================

  # g8ee test runner (Python/pytest/pyright)
  g8ee-test-runner:
    build:
      context: .
      dockerfile: ./components/g8ee/Dockerfile.test
      labels:
        - "io.g8e.managed=true"
    container_name: g8ee-test-runner
    user: "1001:1001"
    labels:
      - "io.g8e.managed=true"
    environment:
      - HOME=/home/g8e
      - G8E_DB_PATH=/data/g8e.db
      - G8E_SSL_DIR=/g8es
      - G8E_SSL_CERT_FILE=/g8es/ca.crt
      - RUNNING_IN_DOCKER=1
    volumes:
      - ./components/g8ee:/app/components/g8ee
      - ./shared:/app/shared
      - ./scripts:/app/scripts
      - g8es-ssl:/g8es:ro
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
          pids: 100
        reservations:
          cpus: '1.0'
          memory: 512M
    networks:
      g8e-network:
        aliases:
          - g8ee-test-runner

  # g8ed test runner (Node.js/vitest)
  g8ed-test-runner:
    build:
      context: .
      dockerfile: ./components/g8ed/Dockerfile.test
      labels:
        - "io.g8e.managed=true"
    container_name: g8ed-test-runner
    user: "1001:1001"
    ulimits:
      nproc: 512
    labels:
      - "io.g8e.managed=true"
    environment:
      - HOME=/home/g8e
      - NODE_ENV=test
      - NODE_EXTRA_CA_CERTS=/g8es/ca.crt
      - G8E_SSL_DIR=/g8es
      - RUNNING_IN_DOCKER=1
    volumes:
      - ./components/g8ed:/app/components/g8ed
      - g8ed-test-node-modules:/app/components/g8ed/node_modules
      - ./shared:/app/shared:ro
      - ./docs:/app/docs:ro
      - ./scripts:/app/scripts
      - g8es-ssl:/g8es:ro
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 2G
          pids: 512
        reservations:
          cpus: '1.0'
          memory: 512M
    networks:
      g8e-network:
        aliases:
          - g8ed-test-runner

  # g8eo test runner & operator builder (Go/gotestsum)
  g8eo-test-runner:
    build:
      context: .
      dockerfile: ./components/g8eo/Dockerfile.test
      labels:
        - "io.g8e.managed=true"
    container_name: g8eo-test-runner
    user: "1001:1001"
    labels:
      - "io.g8e.managed=true"
    environment:
      - HOME=/home/g8e
      - G8E_SSL_DIR=/g8es
      - G8E_SSL_CERT_FILE=/g8es/ca.crt
      - RUNNING_IN_DOCKER=1
    volumes:
      - ./components/g8eo:/app/components/g8eo
      - ./shared:/app/shared:ro
      - ./scripts:/app/scripts
      - g8es-ssl:/g8es:ro
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G
          pids: 1024
        reservations:
          cpus: '1.0'
          memory: 1G
    networks:
      g8e-network:
        aliases:
          - g8eo-test-runner

  # =============================================================================
  # g8e node — always-on sidecar for operator management and platform tooling
  # =============================================================================

  # Operator host, platform scripts, and security tooling.
  # Test running has been moved to dedicated per-component test-runner containers.
  #
  # Docker socket: required for operator build/stream/deploy workflows.
  # g8ep is internal-only (never public-facing). Runs as g8e (uid 1001).
  g8ep:
    build:
      context: .
      dockerfile: components/g8ep/Dockerfile
      labels:
        - "io.g8e.managed=true"
    container_name: g8ep
    hostname: g8ep
    user: "1001:1001"
    labels:
      - "io.g8e.managed=true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOME=/home/g8e
      - G8E_DB_PATH=/data/g8e.db
      - G8E_SSL_DIR=/g8es
      - G8E_PUBSUB_CA_CERT=/g8es/ca.crt
      - G8E_OPERATOR_PUBSUB_URL=wss://g8es:9001
      - G8E_SSL_CERT_FILE=/g8es/ca.crt
      - RUNNING_IN_DOCKER=1
      # SSH streaming: only set SSH_AUTH_SOCK in-container when the host has
      # an agent. Empty value disables agent auth in g8eo.
      - SSH_AUTH_SOCK=${SSH_AUTH_SOCK:+/run/host-ssh-agent.sock}
    volumes:
      - ./components/g8ep/scripts:/app/components/g8ep/scripts
      - ./shared:/app/shared
      - ./scripts:/app/scripts
      - g8es-ssl:/g8es:ro
      - /var/run/docker.sock:/var/run/docker.sock
      # SSH streaming inputs (read-only). Mount the user's existing SSH config
      # and known_hosts; agent socket falls through to /dev/null when no agent.
      - ${HOME}/.ssh/config:/home/g8e/.ssh/config:ro
      - ${HOME}/.ssh/known_hosts:/home/g8e/.ssh/known_hosts:ro
      - ${SSH_AUTH_SOCK:-/dev/null}:/run/host-ssh-agent.sock
    group_add:
      - ${DOCKER_GID:-0}
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 6G
          pids: 200
        reservations:
          cpus: '0.5'
          memory: 1G
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - SYS_PTRACE
      - SETUID
      - SETGID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      g8e-network:
        aliases:
          - g8ep
    healthcheck:
      test: ["CMD", "pgrep", "-x", "supervisord"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      g8ed:
        condition: service_healthy

networks:
  g8e-network:
    name: g8e-network
    labels:
      - "io.g8e.managed=true"
    # Internal DNS aliases for service-to-service communication
    # g8es uses port 9000 for HTTPS and port 9001 for WSS
    driver: bridge

volumes:
  g8ee-data:
    name: g8ee-data
    labels:
      - "io.g8e.managed=true"
  g8ed-data:
    name: g8ed-data
    labels:
      - "io.g8e.managed=true"
  g8ed-node-modules:
    name: g8ed-node-modules
    labels:
      - "io.g8e.managed=true"
  g8ed-test-node-modules:
    name: g8ed-test-node-modules
    labels:
      - "io.g8e.managed=true"
  g8es-data:
    name: g8es-data
    labels:
      - "io.g8e.managed=true"
  g8es-ssl:
    name: g8es-ssl
    labels:
      - "io.g8e.managed=true"
