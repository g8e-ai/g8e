# g8e Docker Compose
#
# Usage (via ./g8e CLI):
#   ./g8e platform setup                   # Full first-time setup: no-cache build, start platform (recommended)
#   ./g8e platform start                   # Start core services (no build)
#   ./g8e platform stop                    # Stop containers (preserve everything)
#   ./g8e platform rebuild                 # Rebuild all services with layer cache (data volumes preserved)
#   ./g8e platform rebuild vsod            # Rebuild a single service (data volumes preserved)
#   ./g8e platform wipe                    # Clear app data; preserve SSL certs, platform settings, auth token
#   ./g8e platform reset                   # Wipe DB data volumes + rebuild from scratch (SSL certs preserved)
#   ./g8e platform clean                   # Full Docker cleanup: containers, images, volumes, networks
#   ./g8e test vse                         # Run tests (never rebuilds)
#
# Volume layout:
#   g8e-data-data  — SQLite DB only (/data inside vsodb, wiped by reset)
#   g8e-data-ssl   — TLS certs only (/ssl inside vsodb, NEVER wiped by reset or wipe)
#   g8e-engine-data — VSE app data
#   g8e-dashboard-data — VSOD app data
#
# Profiles:
#   (default)      - vsodb, vse, vsod, g8e-pod
#   g8e-pod       - g8e-pod (never touched unless explicitly rebuilt or cleaned)
#   development    - includes source bind mounts for hot reload
#
# Development:
#   docker compose --profile development up
#   OR use the traditional override:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:

  # =============================================================================
  # Core Components
  # =============================================================================

  # g8e-engine (VSE) - AI backend
  g8e-engine:
    build:
      context: .
      dockerfile: ./components/vse/Dockerfile
      labels:
        - "io.g8e.managed=true"
    container_name: g8e-engine
    user: "1001:1001"
    labels:
      - "io.g8e.managed=true"
    restart: unless-stopped
    environment:
      - G8E_CA_CERT_PATH=/vsodb/ca.crt
      - NODE_EXTRA_CA_CERTS=/vsodb/ca.crt
      - G8E_DB_PATH=/data/g8e.db
      - G8E_DOCS_DIR=/docs
      - G8E_INTERNAL_AUTH_TOKEN
    volumes:
      - ./shared:/app/shared:ro
      - vse-data:/data:noexec,nosuid,nodev
      - vsodb-ssl:/vsodb:ro
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    deploy:
      resources:
        limits:
          memory: 2G
          pids: 50
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    sysctls:
      - net.ipv4.conf.all.accept_redirects=0
      - net.ipv4.conf.all.send_redirects=0
    networks:
      g8e-network:
        aliases:
          - vse
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      g8e-data:
        condition: service_healthy

  # g8e-dashboard (VSOD) - Web frontend + single external entry point
  #
  # VSOD's G8ENodeOperatorService manages operator sessions inside the g8e-pod
  # container via Supervisor XML-RPC over the network (port 443).
  g8e-dashboard:
    build:
      context: .
      dockerfile: ./components/vsod/Dockerfile
      labels:
        - "io.g8e.managed=true"
    container_name: g8e-dashboard
    user: "1001:1001"
    labels:
      - "io.g8e.managed=true"
    environment:
      - NODE_EXTRA_CA_CERTS=/vsodb/ca.crt
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - vsod-data:/data:noexec,nosuid,nodev
      - vsodb-ssl:/vsodb:ro
      - ./shared:/shared:ro
      - ./docs:/docs:ro
      - ./README.md:/readme/README.md:ro
      - ./components/vsod/views:/app/views:ro
      - ./components/vsod/public:/app/public:ro
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    deploy:
      resources:
        limits:
          memory: 2G
          pids: 50
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    sysctls:
      - net.ipv4.conf.all.accept_redirects=0
      - net.ipv4.conf.all.send_redirects=0
    networks:
      g8e-network:
        aliases:
          - localhost
          - g8e.local
          - vsod
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      g8e-data:
        condition: service_healthy

  # =============================================================================
  # Data Services
  # =============================================================================

  # g8e-data (VSODB) - Operator in --listen mode: platform persistence + pub/sub broker
  g8e-data:
    build:
      context: .
      dockerfile: ./components/vsodb/Dockerfile
      args:
        VERSION: ${G8E_VERSION:-dev}
      labels:
        - "io.g8e.managed=true"
    container_name: g8e-data
    user: "1001:1001"
    labels:
      - "io.g8e.managed=true"
    restart: unless-stopped
    environment:
      - G8E_CA_CERT_PATH=/vsodb/ca.crt
      - NODE_EXTRA_CA_CERTS=/vsodb/ca.crt
      - G8E_INTERNAL_AUTH_TOKEN
    volumes:
      - vsodb-data:/data:noexec,nosuid,nodev
      - vsodb-ssl:/ssl:noexec,nosuid,nodev
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    deploy:
      resources:
        limits:
          memory: 512M
          pids: 30
    cap_add:
      - NET_BIND_SERVICE
    cap_drop:
      - ALL
    networks:
      g8e-network:
        aliases:
          - vsodb
  # Internal services only - uses ports 9000 (HTTPS) and 9001 (WSS)
    healthcheck:
      test: ["CMD-SHELL", "curl -f -k https://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
      

  # =============================================================================
  # g8e node — always-on sidecar for tests
  # =============================================================================

  # Unified test environment with Python, Node, and Go.
  # Always running alongside core services. Run tests with: ./scripts/testing/run_tests.sh
  #
  # Docker socket: required for docker exec into service containers during tests and
  # for operator build/stream/deploy workflows. g8e-pod is internal-only (never
  # public-facing). Runs as g8e (uid 1001).
  g8e-pod:
    build:
      context: .
      dockerfile: components/g8e-pod/Dockerfile
      labels:
        - "io.g8e.managed=true"
    container_name: g8e-pod
    user: "1001:1001"
    labels:
      - "io.g8e.managed=true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOME=/home/g8e
      - G8E_DB_PATH=/data/g8e.db
      - G8E_SSL_DIR=/vsodb
      - G8E_PUBSUB_CA_CERT=/vsodb/ca.crt
      - G8E_OPERATOR_PUBSUB_URL=wss://vsodb:9001
      - G8E_SSL_CERT_FILE=/vsodb/ca.crt
      - REQUESTS_CA_BUNDLE=/vsodb/ca.crt
      - RUNNING_IN_DOCKER=1
      - G8E_INTERNAL_AUTH_TOKEN
      - G8E_SESSION_ENCRYPTION_KEY
    volumes:
      - ./components/vse:/app/components/vse
      - ./components/vsod:/app/components/vsod
      - vsod-node-modules:/app/components/vsod/node_modules
      - ./components/vsa:/app/components/vsa
      - ./components/g8e-pod/scripts:/app/components/g8e-pod/scripts
      - ./shared:/app/shared
      - ./scripts:/app/scripts
      - vsodb-ssl:/vsodb:ro
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - ${DOCKER_GID:-0}
    deploy:
      resources:
        limits:
          memory: 4G
          pids: 200
    cap_add:
      - NET_RAW
      - NET_ADMIN
      - SYS_PTRACE
      - SETUID
      - SETGID
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      g8e-network:
        aliases:
          - drop-pod
    healthcheck:
      test: ["CMD", "pgrep", "-x", "supervisord"]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  g8e-network:
    name: g8e-network
    labels:
      - "io.g8e.managed=true"
    # Internal DNS aliases for service-to-service communication
    # VSODB uses port 9000 for HTTPS and port 9001 for WSS
    driver: bridge

volumes:
  vse-data:
    name: g8e-engine-data
    labels:
      - "io.g8e.managed=true"
  vsod-data:
    name: g8e-dashboard-data
    labels:
      - "io.g8e.managed=true"
  vsod-node-modules:
    name: g8e-dashboard-node-modules
    labels:
      - "io.g8e.managed=true"
  vsodb-data:
    name: g8e-data-data
    labels:
      - "io.g8e.managed=true"
  vsodb-ssl:
    name: g8e-data-ssl
    labels:
      - "io.g8e.managed=true"
