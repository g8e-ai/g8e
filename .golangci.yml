        - gocritic # style checks not critical for test utilities
        - errcheck # test utility, acceptable to ignore some errors
        - unused # test utility functions
    - path: internal/cmd/stream\.go
      linters:
        - gosec
      text: "G304" # legitimate file reads from user-specified paths in stream command
    - path: internal/cmd/stream\.go
      linters:
