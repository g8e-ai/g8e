linters-settings:
  errcheck:
    check-type-assertions: false
    check-blank: true
  govet:
    enable-all: true
    disable:
      - fieldalignment # too noisy for most projects
      - shadow # common Go pattern (if err := ...) causes excessive warnings
  revive:
    ignore-generated-header: true
    severity: warning
    rules:
      - name: atomic
      - name: blank-imports
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
  gosec:
    excludes:
      - G104 # errcheck already handles this
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - wrapperFunc
      - rangeValCopy
      - hugeParam
      - octalLiteral # style preference, not security-critical
      - preferStringWriter # style preference, not security-critical

linters:
  disable-all: true
  enable:
    - bodyclose
    - errcheck
    - gocritic
    - gofmt
    - gosec
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unconvert
    - unused
    - misspell
    - nakedret

run:
  timeout: 5m
  modules-download-mode: readonly
  allow-parallel-runners: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - vendor
    - proto
    - cmd/uap-ping
    - internal/services/openclaw
    - pkg/uap
    - internal/services/system
    - internal/services/sentinel
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
        - govet # test files commonly have unused writes and other test-specific patterns
        - unusedwrite # test files commonly set struct fields not all used
        - gocritic # style checks not critical for tests
        - unused # test helpers and unused types are common
    - path: internal/testutil/pubsub\.go
      linters:
        - bodyclose # false positive: gorilla/websocket Dial returns conn, not http response
    - path: tests/byo_client_test\.go
      linters:
        - bodyclose # false positive: gorilla/websocket Dial returns conn, not http response
    - path: cmd/chaos_tester/main\.go
      linters:
