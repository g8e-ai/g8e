<!-- Operator Panel Wrapper - Contains all panel elements in flow layout -->
<div class="operator-panel-wrapper" id="operator-panel-wrapper">
    <!-- Operator Section Title -->
    <div class="operator-section-title" id="operator-drawer-tab">
        <span class="operator-panel-label">Operator Panel</span>
        <span class="operator-section-title-text">Operators</span>
    </div>

        <div class="operator-drawer-header initially-hidden">
            <!-- Operator Metrics Details -->
            <div class="operator-metrics-details" id="operator-metrics-details">
            <div class="operator-details-grid">
                <!-- System Info Section -->
                <div class="operator-detail-section">
                    <div class="operator-detail-section-header">
                        <span class="material-symbols-outlined operator-detail-section-icon">computer</span>
                        <span class="operator-detail-section-title">System</span>
                    </div>
                    <div class="operator-detail-row">
                        <span class="operator-detail-label">Host</span>
                        <span class="operator-detail-value" id="operator-detail-host"> - </span>
                    </div>
                    <div class="operator-detail-row">
                        <span class="operator-detail-label">OS</span>
                        <span class="operator-detail-value" id="operator-os"> - </span>
                    </div>
                    <div class="operator-detail-row">
                        <span class="operator-detail-label">Kernel</span>
                        <span class="operator-detail-value" id="operator-kernel"> - </span>
                    </div>
                    <div class="operator-detail-row">
                        <span class="operator-detail-label">Arch</span>
                        <span class="operator-detail-value" id="operator-arch"> - </span>
                    </div>
                    <div class="operator-detail-row">
                        <span class="operator-detail-label">Uptime</span>
                        <span class="operator-detail-value" id="operator-uptime"> - </span>
                    </div>
                </div>

                <!-- User Info Section -->
                <div class="operator-detail-section">
                    <div class="operator-detail-section-header">
                        <span class="material-symbols-outlined operator-detail-section-icon">person</span>
                        <span class="operator-detail-section-title">User</span>
                    </div>
                    <div class="operator-detail-row">
                        <span class="operator-detail-label">Username</span>
                        <span class="operator-detail-value" id="operator-username"> - </span>
                    </div>
                    <div class="operator-detail-row">
                        <span class="operator-detail-label">Shell</span>
                        <span class="operator-detail-value" id="operator-shell"> - </span>
                    </div>
                    <div class="operator-detail-row">
                        <span class="operator-detail-label">Home</span>
                        <span class="operator-detail-value" id="operator-home"> - </span>
                    </div>
                    <div class="operator-detail-row">
                        <span class="operator-detail-label">Timezone</span>
                        <span class="operator-detail-value" id="operator-timezone"> - </span>
                    </div>
                </div>

                <!-- Storage Section -->
                <div class="operator-detail-section">
                    <div class="operator-detail-section-header">
                        <span class="material-symbols-outlined operator-detail-section-icon">hard_drive</span>
                        <span class="operator-detail-section-title">Storage</span>
                    </div>
                    <div class="storage-visual">
                        <div class="storage-bar-container">
                            <div class="storage-bar-header">
                                <span class="storage-bar-label">Disk Usage</span>
                                <span class="storage-bar-value" id="operator-disk-usage"> -  /  - </span>
                            </div>
                            <div class="storage-bar">
                                <div class="storage-bar-fill" id="operator-disk-visual"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Memory Section -->
                <div class="operator-detail-section">
                    <div class="operator-detail-section-header">
                        <span class="material-symbols-outlined operator-detail-section-icon">memory</span>
                        <span class="operator-detail-section-title">Memory</span>
                    </div>
                    <div class="storage-visual">
                        <div class="storage-bar-container">
                            <div class="storage-bar-header">
                                <span class="storage-bar-label">RAM Usage</span>
                                <span class="storage-bar-value" id="operator-memory-usage"> -  /  - </span>
                            </div>
                            <div class="storage-bar">
                                <div class="storage-bar-fill" id="operator-memory-visual"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Network Section -->
                <div class="operator-detail-section">
                    <div class="operator-detail-section-header">
                        <span class="material-symbols-outlined operator-detail-section-icon">lan</span>
                        <span class="operator-detail-section-title">Network</span>
                    </div>
                    <div class="operator-detail-row">
                        <span class="operator-detail-label">Public IP</span>
                        <span class="operator-detail-value ip-value-container">
                            <span id="operator-public-ip"> - </span>
                            <span class="ip-visibility-toggle material-symbols-outlined" id="ip-visibility-toggle" title="Show IP">visibility_off</span>
                        </span>
                    </div>
                    <div class="operator-detail-row">
                        <span class="operator-detail-label">Latency</span>
                        <span class="operator-detail-value" id="operator-latency-detail"> - </span>
                    </div>
                </div>

                <!-- Environment Section -->
                <div class="operator-detail-section">
                    <div class="operator-detail-section-header">
                        <span class="material-symbols-outlined operator-detail-section-icon">terminal</span>
                        <span class="operator-detail-section-title">Environment</span>
                    </div>
                    <div class="operator-detail-row">
                        <span class="operator-detail-label">PWD</span>
                        <span class="operator-detail-value" id="operator-pwd"> - </span>
                    </div>
                    <div class="operator-detail-row">
                        <span class="operator-detail-label">Lang</span>
                        <span class="operator-detail-value" id="operator-lang"> - </span>
                    </div>
                </div>
            </div>
            </div><!-- End operator-metrics-details -->
        </div>
        <div class="operator-list-collapsible" id="operator-list-collapsible">
            <button class="operator-list-collapsible-bar" id="operator-list-collapsible-bar">
                <span class="material-symbols-outlined operator-list-bar-icon">groups</span>
                <span class="operator-list-bar-title" id="operator-list-bar-title">(0) Operators Bound</span>
                <span class="material-symbols-outlined operator-list-bar-chevron" id="operator-list-bar-chevron">expand_more</span>
            </button>
            <div class="operator-drawer-content" id="operator-drawer-content">
                <div class="operator-drawer-loading" id="operator-drawer-loading">
                    Loading operators...
                </div>
                <div class="operator-list" id="operator-list"></div>
                <div class="operator-drawer-empty" id="operator-drawer-empty"></div>
            </div>
        </div>
        <div class="operator-drawer-footer" id="operator-drawer-footer">
            <button class="bind-all-btn initially-hidden" id="bind-all-btn">
                <span>Bind</span>
            </button>
            <button class="unbind-all-btn initially-hidden" id="unbind-all-btn">
                <span>Unbind</span>
            </button>
        </div>
    <div class="operator-download-collapsible" id="operator-download-collapsible">
        <button class="operator-download-collapsible-bar" id="operator-download-collapsible-bar">
            <span class="material-symbols-outlined operator-download-bar-icon">download</span>
            <span class="operator-download-bar-title">Operator Deployment</span>
            <span class="material-symbols-outlined operator-download-bar-chevron" id="operator-download-bar-chevron">expand_more</span>
        </button>
        <div class="operator-download-collapsible-content" id="operator-download-collapsible-content">
        </div>
    </div>
</div><!-- End operator-panel-wrapper -->
