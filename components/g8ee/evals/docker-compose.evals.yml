# g8e Evals Fleet - Real operator containers for evaluation scenarios
# Each eval-node runs a real g8e operator with device token authentication
# Containers use their own network for evals isolation

networks:
  g8e-network:
    driver: bridge

services:
  eval-node:
    build:
      context: ./containers/eval-node
      dockerfile: Dockerfile
    networks:
      - g8e-network
    labels:
      - "io.g8e.evals=true"
    tmpfs:
      - /tmp:mode=1777
    restart: unless-stopped
    volumes:
      - ../../../.g8e/ssl/ca/ca.crt:/operator/ca.crt:ro
    environment:
      DEVICE_TOKEN: ${DEVICE_TOKEN:-}
      G8E_ENDPOINT: ${G8E_ENDPOINT:-localhost}
      EVAL_PROFILE: healthy
    extra_hosts:
      - "localhost:host-gateway"
    hostname: "evals-eval-node"
