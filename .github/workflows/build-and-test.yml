name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Build platform
        run: ./g8e platform setup

  test-g8ee:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Build platform
        run: ./g8e platform setup

      - name: Test g8ee
        run: >-
          ./g8e test g8ee
          -p gemini
          -k "$GEMINI_API_KEY"
          -m gemini-3.1-pro-preview-customtools
          -a gemini-3-flash-preview
          -l gemini-3.1-flash-lite-preview
          -j auto
          -- tests --ignore=tests/evals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  test-g8ed:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Build platform
        run: ./g8e platform setup

      - name: Test g8ed
        run: ./g8e test g8ed

  test-g8eo:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Build platform
        run: ./g8e platform setup

      - name: Test g8eo
        run: ./g8e test g8eo
