name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-proto:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ github.token }}

      - name: Generate Proto
        run: make proto

      - name: Verify Constants
        run: |
          python3 scripts/data/generate_constants.py --all
          CHANGES=$(git status --porcelain | grep -E "^\s*M.*\.go$|^\s*M.*\.py$|^\s*M.*\.sh$" || true)
          if [ -n "$CHANGES" ]; then
            echo "Error: Generated constant files are out of sync with protocol/constants/*.json"
            echo "$CHANGES"
            git diff
            exit 1
          fi

      - name: Check for drift
        run: |
          # Only check for changes in generated proto files, ignore untracked files
          CHANGES=$(git status --porcelain | grep -E "^\s*M.*\.pb\.go$|^\s*M.*_pb2.*\.py$|^\s*M.*\.proto$" || true)
          if [ -n "$CHANGES" ]; then
            echo "Error: Generated proto files are out of sync with protocol/proto/*.proto"
            echo "$CHANGES"
            git diff -- $(git status --porcelain | grep -E "^\s*M" | awk '{print $2}')
            exit 1
          fi

      - name: Lint no bare session_id
        run: make lint-no-bare-session-id

  lint-g8eo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/g8eo/go.mod
          cache-dependency-path: services/g8eo/go.sum

      - name: Run golangci-lint (g8eo)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          working-directory: services/g8eo

      - name: Run golangci-lint (protocol)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          working-directory: protocol

  vulncheck-g8eo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/g8eo/go.mod
          cache-dependency-path: services/g8eo/go.sum

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: services/g8eo

  test-g8eo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/g8eo/go.mod
          cache-dependency-path: services/g8eo/go.sum

      - name: Start Operator substrate
        run: ./g8e platform start

      - name: Test Operator substrate
        run: ./g8e test

      - name: Show Operator logs
        if: failure()
        run: tail -n 200 .g8e/logs/operator-listen.log || true

      - name: Stop platform
        if: always()
        run: ./g8e platform stop

  constants-lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/g8eo/go.mod
          cache-dependency-path: services/g8eo/go.sum

      - name: Run Constants Lint
        run: go test -v -run TestNoRawStringLiteralsWhereConstantsExist ./internal/contracts
        working-directory: services/g8eo
        env:
          G8E_STRICT_CONSTANTS_LINT: "1"

  apps-g8ee:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: services/g8eo/go.mod
          cache-dependency-path: services/g8eo/go.sum

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Start Operator substrate
        run: ./g8e platform start

      - name: Start g8ee adapter
        run: ./g8e apps start g8ee

      - name: Test g8ee adapter
        run: >-
          ./g8e test g8ee
          -p gemini
          -k "$GEMINI_API_KEY"
          -m gemini-3.1-pro-preview-customtools
          -a gemini-3-flash-preview
          -l gemini-3.1-flash-lite
          -j auto
          -- tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Show app logs
        if: failure()
        run: |
          tail -n 200 .g8e/logs/operator-listen.log || true
          tail -n 200 .g8e/logs/g8ee.log || true

      - name: Stop platform
        if: always()
        run: ./g8e platform stop

