name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-g8ee:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: components/g8eo/go.mod
          cache-dependency-path: components/g8eo/go.sum

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: components/g8ed/package-lock.json

      - name: Install g8ed dependencies
        run: npm ci --prefix components/g8ed

      - name: Start platform
        run: ./g8e platform start

      - name: Test g8ee
        run: >-
          ./g8e test g8ee
          -p gemini
          -k "$GEMINI_API_KEY"
          -m gemini-3.1-pro-preview-customtools
          -a gemini-3-flash-preview
          -l gemini-3.1-flash-lite-preview
          -j auto
          -- tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Show platform logs
        if: failure()
        run: |
          tail -n 200 .g8e/logs/operator-listen.log || true
          tail -n 200 .g8e/logs/g8ee.log || true
          tail -n 200 .g8e/logs/g8ed.log || true

      - name: Stop platform
        if: always()
        run: ./g8e platform stop

  test-g8ed:
    runs-on: ubuntu-latest
    timeout-minutes: 30
