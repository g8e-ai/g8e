name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-proto:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate Proto
        run: ./scripts/core/gen-proto.sh

      - name: Check for drift
        run: |
          # Only check for changes in generated proto files, ignore untracked files
          CHANGES=$(git status --porcelain | grep -E "^\s*M.*\.pb\.go$|^\s*M.*_pb2.*\.py$|^\s*M.*\.proto$" || true)
          if [ -n "$CHANGES" ]; then
            echo "Error: Generated proto files are out of sync with shared/proto/*.proto"
            echo "$CHANGES"
            git diff -- $(git status --porcelain | grep -E "^\s*M" | awk '{print $2}')
            exit 1
          fi

  test-g8eo:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: components/g8eo/go.mod
          cache-dependency-path: components/g8eo/go.sum

      - name: Start Operator substrate
        run: ./g8e platform start

      - name: Test Operator substrate
        run: ./g8e test

      - name: Show Operator logs
        if: failure()
        run: tail -n 200 .g8e/logs/operator-listen.log || true

      - name: Stop platform
        if: always()
        run: ./g8e platform stop

  apps-g8ee:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: components/g8eo/go.mod
          cache-dependency-path: components/g8eo/go.sum

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Start Operator substrate
        run: ./g8e platform start

      - name: Start g8ee adapter
        run: ./g8e apps start g8ee

      - name: Test g8ee adapter
        run: >-
          ./g8e test g8ee
          -p gemini
          -k "$GEMINI_API_KEY"
          -m gemini-3.1-pro-preview-customtools
          -a gemini-3-flash-preview
          -l gemini-3.1-flash-lite
          -j auto
          -- tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Show app logs
        if: failure()
        run: |
          tail -n 200 .g8e/logs/operator-listen.log || true
          tail -n 200 .g8e/logs/g8ee.log || true

      - name: Stop platform
        if: always()
        run: ./g8e platform stop

