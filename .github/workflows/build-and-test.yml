      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: components/g8ed/package-lock.json

      - name: Install g8ed dependencies
        run: npm ci --prefix components/g8ed

      - name: Start platform
        run: ./g8e platform start

      - name: Test g8ed
        run: ./g8e test g8ed

      - name: Show platform logs
        if: failure()
        run: |
          tail -n 200 .g8e/logs/operator-listen.log || true
          tail -n 200 .g8e/logs/g8ee.log || true
          tail -n 200 .g8e/logs/g8ed.log || true

      - name: Stop platform
        if: always()
        run: ./g8e platform stop

  test-g8eo:
