name: Bug Report
description: Create a report to help us improve
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before reporting, please ensure you have attempted to reproduce the bug in the `g8ep` test-runner container.
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How did you encounter this bug?
      placeholder: |
        1. Run `/home/bob/g8e/g8e test ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant logs from the operator or platform services.
