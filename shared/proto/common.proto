syntax = "proto3";

package g8e.common.v1;

option go_package = "github.com/g8e-ai/g8e/components/g8eo/shared/proto/commonv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/descriptor.proto";

// Custom options for governance
extend google.protobuf.FieldOptions {
  // Comma-separated list of forbidden regex patterns
  string forbidden_patterns = 50001;
}

// Source component identifier
enum Component {
  COMPONENT_UNSPECIFIED = 0;
  COMPONENT_G8EE = 1;
  COMPONENT_G8EO = 2;
  COMPONENT_G8ED = 3;
}

// Universal Envelope for all BFT transactions
message UniversalEnvelope {
  // Unique per-message identifier (UUID v4)
  string id = 1;
  
  // Creation timestamp
  google.protobuf.Timestamp timestamp = 2;
  
  // Component that published this message
  Component source_component = 3;
  
  // Event type string (canonical from events.json)
  string event_type = 4;
  
  // Identity and Context
  string operator_id = 5;
  string operator_session_id = 6;
  string case_id = 7;
  string investigation_id = 8;
  string task_id = 9;
  string web_session_id = 10;
  
  // Hardware-bound fingerprint (g8eo only)
  string system_fingerprint = 11;
  
  // Merkle root of the fleet state at time of generation
  string state_merkle_root = 12;
  
  // Governance Metadata (L1/L2/L3)
  GovernanceMetadata governance = 13;
  
  // The actual payload (serialized bytes)
  bytes payload = 14;
}

message GovernanceMetadata {
  // L1: Technical Bedrock (Hard Gates)
  L1Metadata l1 = 1;
  
  // L2: Consensus (Tribunal)
  L2Metadata l2 = 2;
  
  // L3: Authorization (Human Approval)
  L3Metadata l3 = 3;
}

message L1Metadata {
  // Boolean indicating if it passed technical gates (sudo, su, etc.)
  bool validated = 1;
  // List of violated patterns if any
  repeated string violations = 2;
}

message L2Metadata {
  // The L2 Tribunal signature (5-agent plurality)
  string tribunal_signature = 1;
  // List of agent IDs that participated in consensus
  repeated string agent_ids = 2;
}

message L3Metadata {
  // Hardware-bound signature (Passkey)
  string human_signature = 1;
  // The public key used for verification
  string public_key = 2;
  // Auto-approval flag if it was a benign command
  bool auto_approved = 3;
}
