syntax = "proto3";

package g8e.operator.v1;

option go_package = "github.com/g8e-ai/g8e/components/g8eo/shared/proto/operatorv1";

import "common.proto";

// Execution status enum for command and operation results
enum ExecutionStatus {
  EXECUTION_STATUS_UNSPECIFIED = 0;
  EXECUTION_STATUS_EXECUTING = 1;
  EXECUTION_STATUS_COMPLETED = 2;
  EXECUTION_STATUS_FAILED = 3;
  EXECUTION_STATUS_CANCELLED = 4;
  EXECUTION_STATUS_TIMEOUT = 5;
}

// Heartbeat type enum
enum HeartbeatType {
  HEARTBEAT_TYPE_UNSPECIFIED = 0;
  HEARTBEAT_TYPE_AUTOMATIC = 1;
  HEARTBEAT_TYPE_MANUAL = 2;
}

// Payload for g8e.v1.operator.command.requested
message CommandRequested {
  // Shell command string to execute
  string command = 1 [(g8e.common.v1.forbidden_patterns) = "sudo,su,rm -rf /"];
  
  // Unique execution identifier (correlation key)
  string execution_id = 2;
  
  // Justification for running this command (High-level Sage request)
  string justification = 3;
  
  // Vault scrubbing mode for output storage
  string sentinel_mode = 4;
  
  // Execution timeout override in seconds
  int32 timeout_seconds = 5;
  
  // Intent: The high-level goal (The "Why")
  string intent = 6;

  // Environment variables
  map<string, string> environment = 7;

  // Working directory override
  string working_directory = 8;
}

message CommandCancelRequested {
  string execution_id = 1;
}

message FileEditRequested {
  string file_path = 1;
  string operation = 2;
  string execution_id = 3;
  string justification = 4;
  string content = 5;
  string old_content = 6;
  string new_content = 7;
  string insert_content = 8;
  int32 insert_position = 9;
  int32 start_line = 10;
  int32 end_line = 11;
  string patch_content = 12;
  bool create_backup = 13;
  bool create_if_missing = 14;
  string sentinel_mode = 15;
}

message FsListRequested {
  string path = 1;
  string execution_id = 2;
  int32 max_depth = 3;
  int32 max_entries = 4;
  string sentinel_mode = 5;
}

message FsReadRequested {
  string path = 1;
  string execution_id = 2;
  int32 max_size = 3;
  string sentinel_mode = 4;
}

message HeartbeatRequested {
  // Empty message - just the event type matters
}

message FsGrepRequested {
  string path = 1;
  string execution_id = 2;
  string pattern = 3;
  repeated string includes = 4;
  int32 max_matches = 5;
  string sentinel_mode = 6;
}

message CheckPortRequested {
  string execution_id = 1;
  int32 port = 2;
  string host = 3;
  string protocol = 4;
}

message FetchLogsRequested {
  string execution_id = 1;
  string sentinel_mode = 2;
}

message FetchHistoryRequested {
  string execution_id = 1;
  string operator_session_id = 2;
  int32 limit = 3;
  int32 offset = 4;
  bool include_commands = 5;
  bool include_file_mutations = 6;
}

message FetchFileHistoryRequested {
  string execution_id = 1;
  string file_path = 2;
  int32 limit = 3;
}

message FetchFileDiffRequested {
  string execution_id = 1;
  string diff_id = 2;
  string operator_session_id = 3;
  string file_path = 4;
  int32 limit = 5;
}

message RestoreFileRequested {
  string execution_id = 1;
  string file_path = 2;
  string commit_hash = 3;
  string operator_session_id = 4;
}

message DirectCommandAuditRequested {
  string command = 1;
  string execution_id = 2;
  string operator_session_id = 3;
  string type = 4;
}

message DirectCommandResultAuditRequested {
  string command = 1;
  string execution_id = 2;
  string output = 3;
  string stderr = 4;
  int32 exit_code = 5;
  float execution_time_seconds = 6;
}

message AuditMsgRequested {
  string content = 1;
}

message SignCertificateRequested {
  string public_key_pem = 1;
  string common_name = 2;
  string organizational_unit = 3;
  int32 validity_days = 4;
}

message SignCertificateResult {
  bool success = 1;
  string certificate_pem = 2;
  string serial = 3;
  string error = 4;
}

message RevokeCertificateRequested {
  string serial = 1;
  string reason = 2;
}

message RevokeCertificateResult {
  bool success = 1;
  string error = 2;
}

message GetRevocationBundleRequested {
}

message GetRevocationBundleResult {
  bool success = 1;
  string bundle_json = 2;
  string signature = 3;
  string error = 4;
}

message CreateDeviceLinkRequested {
  string user_id = 1;
  string organization_id = 2;
  string operator_id = 3;
  string web_session_id = 4;
  string name = 5;
  int32 max_uses = 6;
  int32 ttl_seconds = 7;
}

message DeviceLink {
  string token = 1;
  string user_id = 2;
  string organization_id = 3;
  string operator_id = 4;
  string web_session_id = 5;
  string name = 6;
  int32 max_uses = 7;
  int32 uses = 8;
  string status = 9;
  int64 created_at_unix_ms = 10;
  int64 expires_at_unix_ms = 11;
}

message DeviceLinkResult {
  bool success = 1;
  DeviceLink link = 2;
  string operator_command = 3;
  string error = 4;
}

message ListDeviceLinksRequested {
  string user_id = 1;
}

message ListDeviceLinksResult {
  bool success = 1;
  repeated DeviceLink links = 2;
  string error = 3;
}

message DeleteDeviceLinkRequested {
  string token = 1;
  string user_id = 2;
}

message TerminateOperatorRequested {
  string operator_id = 1;
  string user_id = 2;
  string reason = 3;
}

message TerminateOperatorResult {
  bool success = 1;
  string message = 2;
  string error = 3;
}

message RotateAPIKeyRequested {
  string operator_id = 1;
  string user_id = 2;
}

message RotateAPIKeyResult {
  bool success = 1;
  string error = 2;
}

message ListOperatorSlotsRequested {
  string user_id = 1;
}

message ListOperatorSlotsResult {
  bool success = 1;
  repeated OperatorDocument operators = 2;
  string error = 3;
}

message BindOperatorsRequested {
  repeated string operator_ids = 1;
  string user_id = 2;
  string session_id = 3; // The client/web session ID
}

message BindOperatorsResult {
  bool success = 1;
  int32 bound_count = 2;
  int32 failed_count = 3;
  repeated string bound_operator_ids = 4;
  repeated string failed_operator_ids = 5;
  string error = 6;
}

message UnbindOperatorsRequested {
  repeated string operator_ids = 1;
  string user_id = 2;
  string session_id = 3;
}

message UnbindOperatorsResult {
  bool success = 1;
  int32 unbound_count = 2;
  int32 failed_count = 3;
  repeated string unbound_operator_ids = 4;
  repeated string failed_operator_ids = 5;
  string error = 6;
}

message SetTargetContextRequested {
  string operator_id = 1;
  string user_id = 2;
  string session_id = 3;
}

message SetTargetContextResult {
  bool success = 1;
  string operator_id = 2;
  string error = 3;
}

message OperatorDocument {
  string id = 1;
  string user_id = 2;
  string organization_id = 3;
  string component = 4;
  string name = 5;
  string status = 6;
  string operator_session_id = 7;
  string bound_web_session_id = 8;
  string api_key = 9;
  string operator_api_key = 10;
  string operator_cert = 11;
  string operator_cert_serial = 12;
  int32 slot_number = 13;
  bool is_slot = 14;
  bool claimed = 15;
  string operator_type = 16;
  string cloud_subtype = 17;
  string system_fingerprint = 18;
  int64 created_at_unix_ms = 19;
  int64 updated_at_unix_ms = 20;
}

message ShutdownRequested {
  string reason = 1;
}

// ActionReceipt is the signed proof of a completed or failed mutation.
// It is emitted by the Warden after execution.
message ActionReceipt {
  // Original UniversalEnvelope ID
  string transaction_id = 1;
  
  // Original UniversalEnvelope hash
  string transaction_hash = 2;
  
  // Final execution status
  ExecutionStatus status = 3;
  
  // Concise summary of the result (e.g. "exit code 0", "file written")
  string result_summary = 4;
  
  // State root before execution
  string state_root_before = 5;
  
  // State root after execution
  string state_root_after = 6;
  
  // Timestamp when execution finished
  int64 executed_at_unix_ms = 7;
  
  // ID of the Warden's signing key
  string signer_key_id = 8;
  
  // ED25519 signature over canonical serialization of fields 1-8
  string signature = 9;
}

// Result payload for g8e.v1.operator.command.completed or failed
message CommandResult {
  string execution_id = 1;
  ExecutionStatus status = 2;
  string stdout = 3;
  string error = 4;
  string stderr = 5;
  int32 return_code = 6;
  float execution_time_seconds = 7;
  
  // Timestamp when execution started
  int64 start_time_unix_ms = 8;
  
  // Timestamp when execution ended
  int64 end_time_unix_ms = 9;
}

service OperatorService {
  // Execute a shell command
  rpc ExecuteCommand(CommandRequested) returns (CommandResult);
  
  // Cancel a running command
  rpc CancelCommand(CommandCancelRequested) returns (CommandResult);
  
  // Edit a file
  rpc EditFile(FileEditRequested) returns (CommandResult);
  
  // List directory contents
  rpc ListFileSystem(FsListRequested) returns (CommandResult);
  
  // Read file contents
  rpc ReadFileSystem(FsReadRequested) returns (CommandResult);
}

// Hardened Result Payloads (v0.2.0 Protocol-First)

message FsEntry {
  string name = 1;
  bool is_dir = 2;
  int64 size = 3;
  int32 mode = 4;
  int64 mod_time = 5;
}

message FsListResult {
  string execution_id = 1;
  ExecutionStatus status = 2;
  string path = 3;
  repeated FsEntry entries = 4;
  bool truncated = 5;
  int32 total_count = 6;
  float duration_seconds = 7;
  string error_message = 8;
  string error_type = 9;
}

message FsReadResult {
  string execution_id = 1;
  ExecutionStatus status = 2;
  string path = 3;
  string content = 4;
  int64 size_bytes = 5;
  bool truncated = 6;
  float duration_seconds = 7;
  string error_message = 8;
  string error_type = 9;
}

message FsGrepMatch {
  string path = 1;
  int32 line_number = 2;
  string content = 3;
  repeated string before = 4;
  repeated string after = 5;
}

message FsGrepResult {
  string execution_id = 1;
  ExecutionStatus status = 2;
  string path = 3;
  repeated FsGrepMatch matches = 4;
  int32 total_matches = 5;
  bool truncated = 6;
  float duration_seconds = 7;
  string error_message = 8;
  string error_type = 9;
}

message FileEditResult {
  string execution_id = 1;
  ExecutionStatus status = 2;
  string file_path = 3;
  string operation = 4;
  float duration_seconds = 5;
  int64 bytes_written = 6;
  int32 lines_changed = 7;
  string backup_path = 8;
  string error_message = 9;
  string error_type = 10;
  string content = 11;
  int32 stdout_size = 12;
  int32 stderr_size = 13;
}

message ExecutionStatusUpdate {
  string execution_id = 1;
  ExecutionStatus status = 2;
  string command = 3;
  bool process_alive = 4;
  float elapsed_seconds = 5;
  string new_output = 6;
  string new_stderr = 7;
  string message = 8;
}

message PortCheckEntry {
  string host = 1;
  int32 port = 2;
  bool open = 3;
  float latency_ms = 4;
  string error = 5;
}

message PortCheckResult {
  string execution_id = 1;
  ExecutionStatus status = 2;
  repeated PortCheckEntry results = 3;
  string error_message = 4;
  string error_type = 5;
}

message FetchLogsResult {
  string execution_id = 1;
  string command = 2;
  int32 return_code = 3;
  int64 duration_ms = 4;
  string stdout = 5;
  string stderr = 6;
  int32 stdout_size = 7;
  int32 stderr_size = 8;
  string timestamp = 9;
  string sentinel_mode = 10;
  string error = 11;
}

message AuditWebSession {
  string id = 1;
  string title = 2;
  string created_at = 3;
  string user_identity = 4;
}

message AuditFileMutation {
  int64 id = 1;
  string filepath = 2;
  string operation = 3;
  string ledger_hash_before = 4;
  string ledger_hash_after = 5;
  string diff_stat = 6;
}

message AuditEvent {
  int64 id = 1;
  string operator_session_id = 2;
  string timestamp = 3;
  string type = 4;
  string content_text = 5;
  string command_raw = 6;
  int32 command_exit_code = 7;
  string command_stdout = 8;
  string command_stderr = 9;
  int64 execution_duration_ms = 10;
  bool stored_locally = 11;
  bool stdout_truncated = 12;
  bool stderr_truncated = 13;
  repeated AuditFileMutation file_mutations = 14;
}

message FetchHistoryResult {
  bool success = 1;
  string execution_id = 2;
  string operator_session_id = 3;
  AuditWebSession web_session = 4;
  repeated AuditEvent events = 5;
  int32 total = 6;
  int32 limit = 7;
  int32 offset = 8;
  string error = 9;
}

message FileHistoryEntry {
  string commit_hash = 1;
  string timestamp = 2;
  string message = 3;
}

message FetchFileHistoryResult {
  bool success = 1;
  string execution_id = 2;
  string file_path = 3;
  repeated FileHistoryEntry history = 4;
  string error = 5;
}

message RestoreFileResult {
  bool success = 1;
  string execution_id = 2;
  string file_path = 3;
  string commit_hash = 4;
  string error = 5;
}

message FileDiffEntry {
  string id = 1;
  string timestamp = 2;
  string file_path = 3;
  string operation = 4;
  string ledger_hash_before = 5;
  string ledger_hash_after = 6;
  string diff_stat = 7;
  string diff_content = 8;
  int32 diff_size = 9;
  string operator_session_id = 10;
}

message FetchFileDiffResult {
  bool success = 1;
  string execution_id = 2;
  repeated FileDiffEntry diffs = 3;
  FileDiffEntry diff = 4;
  int32 total = 5;
  string operator_session_id = 6;
  string error = 7;
}

message HeartbeatResult {
  string operator_id = 1;
  string operator_session_id = 2;
  string timestamp = 3;
  string status = 4;
  string event_type = 5;
  string source_component = 6;
  string case_id = 7;
  string investigation_id = 8;
  SystemIdentity system_identity = 9;
  NetworkInfo network_info = 10;
  VersionInfo version_info = 11;
  UptimeInfo uptime_info = 12;
  PerformanceMetrics performance_metrics = 13;
  OSDetails os_details = 14;
  UserDetails user_details = 15;
  DiskDetails disk_details = 16;
  MemoryDetails memory_details = 17;
  EnvironmentDetails environment = 18;
  CapabilityFlags capability_flags = 19;
  FingerprintDetails fingerprint_details = 20;
  string system_fingerprint = 21;
  string api_key = 22;
}

message SystemIdentity {
  string hostname = 1;
  string os = 2;
  string architecture = 3;
  string pwd = 4;
  string current_user = 5;
  int32 cpu_count = 6;
  int32 memory_mb = 7;
}

message NetworkInterface {
  string name = 1;
  string ip = 2;
  int32 mtu = 3;
}

message NetworkInfo {
  string public_ip = 1;
  string internal_ip = 2;
  repeated string interfaces = 3;
  repeated NetworkInterface connectivity_status = 4;
}

message CapabilityFlags {
  bool local_storage_enabled = 1;
  bool git_available = 2;
  bool ledger_mirror_enabled = 3;
}

message VersionInfo {
  string operator_version = 1;
  string status = 2;
}

message UptimeInfo {
  string uptime = 1;
  int64 uptime_seconds = 2;
}

message PerformanceMetrics {
  double cpu_percent = 1;
  double memory_percent = 2;
  double disk_percent = 3;
  double network_latency = 4;
  int32 memory_used_mb = 5;
  int32 memory_total_mb = 6;
  double disk_used_gb = 7;
  double disk_total_gb = 8;
}

message OSDetails {
  string kernel = 1;
  string distro = 2;
  string version = 3;
}

message UserDetails {
  string username = 1;
  int32 uid = 2;
  int32 gid = 3;
  string home = 4;
  string name = 5;
  string shell = 6;
}

message DiskDetails {
  double total_gb = 1;
  double used_gb = 2;
  double free_gb = 3;
  double percent = 4;
}

message MemoryDetails {
  int64 total_mb = 1;
  int64 available_mb = 2;
  int64 used_mb = 3;
  double percent = 4;
}

message EnvironmentDetails {
  string pwd = 1;
  string lang = 2;
  string timezone = 3;
  string term = 4;
  bool is_container = 5;
  string container_runtime = 6;
  repeated string container_signals = 7;
  string init_system = 8;
}

message FingerprintDetails {
  string os = 1;
  string architecture = 2;
  int32 cpu_count = 3;
  string machine_id = 4;
}

// ============================================================================
// Passkey / WebAuthn L3 Brokerage
// ============================================================================

// A stored passkey credential for a user
message PasskeyCredential {
  string id = 1;
  string public_key = 2;  // base64url-encoded public key
  int64 counter = 3;
  repeated string transports = 4;
  int64 created_at_unix_ms = 5;
  int64 last_used_at_unix_ms = 6;
}

// ---------------------------------------------------------------------------
// Registration Challenge
// ---------------------------------------------------------------------------

message PasskeyRegisterChallengeRequested {
  string user_id = 1;
  string email = 2;
  string user_name = 3;
}

message PasskeyRegisterChallengeResult {
  bool success = 1;
  string error = 2;
  // WebAuthn PublicKeyCredentialCreationOptions fields
  string challenge = 3;
  message RelyingParty {
    string name = 1;
    string id = 2;
  }
  RelyingParty rp = 4;
  message UserInfo {
    string id = 1;
    string name = 2;
    string display_name = 3;
  }
  UserInfo user = 5;
  message PublicKeyCredentialParameters {
    string type = 1;
    int32 alg = 2;
  }
  repeated PublicKeyCredentialParameters pub_key_cred_params = 6;
  int64 timeout = 7;
  string attestation = 8;
  message AuthenticatorSelection {
    string resident_key = 1;
    string user_verification = 2;
  }
  AuthenticatorSelection authenticator_selection = 9;
  repeated string exclude_credentials = 10;
}

// ---------------------------------------------------------------------------
// Registration Verification
// ---------------------------------------------------------------------------

message AttestationResponse {
  string id = 1;
  string raw_id = 2;
  string client_data_json = 3;
  string attestation_object = 4;
  repeated string transports = 5;
}

message PasskeyRegisterVerifyRequested {
  string user_id = 1;
  AttestationResponse attestation_response = 2;
}

message PasskeyRegisterVerifyResult {
  bool success = 1;
  string error = 2;
  PasskeyCredential credential = 3;
}

// ---------------------------------------------------------------------------
// Authentication Challenge
// ---------------------------------------------------------------------------

message PasskeyAuthChallengeRequested {
  string email = 1;
  string user_id = 2;
}

message PasskeyAuthChallengeResult {
  bool success = 1;
  string error = 2;
  bool needs_setup = 3;
  // WebAuthn PublicKeyCredentialRequestOptions fields
  string challenge = 4;
  int64 timeout = 5;
  string rp_id = 6;
  repeated string allow_credentials = 7;
  string user_verification = 8;
}

// ---------------------------------------------------------------------------
// Authentication Verification
// ---------------------------------------------------------------------------

message AssertionResponse {
  string id = 1;
  string raw_id = 2;
  string client_data_json = 3;
  string authenticator_data = 4;
  string signature = 5;
  string user_handle = 6;
}

message PasskeyAuthVerifyRequested {
  string email = 1;
  string user_id = 2;
  AssertionResponse assertion_response = 3;
}

message PasskeyAuthVerifyResult {
  bool success = 1;
  string error = 2;
  string user_id = 3;
  string session_id = 4;
  int64 session_expires_at_unix_ms = 5;
}

// ---------------------------------------------------------------------------
// Credential Management
// ---------------------------------------------------------------------------

message ListPasskeyCredentialsRequested {
  string user_id = 1;
}

message ListPasskeyCredentialsResult {
  bool success = 1;
  string error = 2;
  repeated PasskeyCredential credentials = 3;
}

message RevokePasskeyCredentialRequested {
  string user_id = 1;
  string credential_id = 2;
}

message RevokePasskeyCredentialResult {
  bool success = 1;
  string error = 2;
  bool found = 3;
  int32 remaining = 4;
}
